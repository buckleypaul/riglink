CONFIG_RIGLINK=y
CONFIG_RIGLINK_BACKEND_SHELL=y
CONFIG_RIGLINK_MEM_ACCESS=n

CONFIG_JCON=y
CONFIG_JCON_ENABLE_FLOAT=y
CONFIG_SERIAL=y
CONFIG_REBOOT=y

# Shell — set up for machine-driven I/O: no prompt, no echo, no ANSI escapes.
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_PROMPT_UART=""
CONFIG_SHELL_VT100_COMMANDS=n
CONFIG_SHELL_ECHO_STATUS=n
CONFIG_SHELL_AUTOSTART=y
CONFIG_SHELL_HELP=n
CONFIG_SHELL_HISTORY=n
CONFIG_SHELL_METAKEYS=n
CONFIG_SHELL_TAB=n
CONFIG_SHELL_STATS=n
CONFIG_SHELL_CMD_BUFF_SIZE=256
CONFIG_SHELL_ARGC_MAX=10
# Commands run on the shell thread, not main(). riglink's str-argument
# trampoline puts up to 8 * RIG_STR_ARG_SIZE bytes of argument buffers on the
# stack; a command calling into a heavy library on top of that can overflow it,
# failing silently (no response -> host timeout). Raise this for such commands.
CONFIG_SHELL_STACK_SIZE=2048
# Command lines longer than this overflow the shell's RX ring buffer and get
# corrupted mid-token (a split argument -> spurious arg_count mismatch and a
# reply desynced by one command). Default is 64; raise it for long command lines.
CONFIG_SHELL_BACKEND_SERIAL_RX_RING_BUFFER_SIZE=256

CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
