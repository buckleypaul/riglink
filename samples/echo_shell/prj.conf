CONFIG_RIGLINK=y
CONFIG_RIGLINK_BACKEND_SHELL=y
CONFIG_RIGLINK_MEM_ACCESS=n

# Give riglink an input line long enough to carry the long-string commands
# (echo_str / hash_str). Must be >= RIG_STR_ARG_SIZE in src/main.c (192) so a
# token that fits the line also fits the parsed-argument buffer.
CONFIG_RIGLINK_LINE_BUF_SIZE=200

# rig_emit_str() JSON-escapes into a CONFIG_RIGLINK_SCRATCH_SIZE-byte scratch
# buffer (default 128, truncating longer values with "..."). echo_str echoes the
# whole long argument back, so widen the scratch to fit it (worst case an
# all-escaped value needs ~2x, but the round-tripped test data is plain ASCII).
CONFIG_RIGLINK_SCRATCH_SIZE=256

CONFIG_JCON=y
CONFIG_JCON_ENABLE_FLOAT=y
CONFIG_SERIAL=y
CONFIG_REBOOT=y

# Shell — set up for machine-driven I/O: no prompt, no echo, no ANSI escapes.
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_PROMPT_UART=""
CONFIG_SHELL_VT100_COMMANDS=n
CONFIG_SHELL_ECHO_STATUS=n
CONFIG_SHELL_AUTOSTART=y
CONFIG_SHELL_HELP=n
CONFIG_SHELL_HISTORY=n
CONFIG_SHELL_METAKEYS=n
CONFIG_SHELL_TAB=n
CONFIG_SHELL_STATS=n
CONFIG_SHELL_CMD_BUFF_SIZE=256
CONFIG_SHELL_ARGC_MAX=10
CONFIG_SHELL_STACK_SIZE=2048

# --- Give riglink EXCLUSIVE use of its UART -------------------------------
# The shell owns the serial port that carries the JSON frames. Any other
# subsystem that writes to that same UART will interleave bytes mid-frame and
# corrupt a sentinel line (seen on a real DK: async log flushes splicing into a
# response). So nothing else may share this wire:
#
#  * CONFIG_UART_CONSOLE=n — keep printk()/the console driver off the UART; with
#    it on, a stray printk() or boot banner lands between JSON lines.
#  * CONFIG_LOG_BACKEND_UART=n — keep the deferred-log backend off the UART.
#    (Set per-board in boards/*.conf, since the right value depends on whether
#    the board even routes logs to this UART; native_sim and the nRF52 DK both
#    disable it there.)
#  * Logging stays compiled in but is harmless on the wire because no backend
#    targets this UART. If you need firmware-side logs during bring-up, route
#    them off-wire (CONFIG_LOG_BACKEND_RTT=y) rather than re-enabling the UART
#    backend, or accept CONFIG_LOG_BACKEND_SHELL=y (logs are then serialised
#    against responses on the shell thread instead of racing them).
CONFIG_UART_CONSOLE=n

CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
