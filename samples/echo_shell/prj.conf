CONFIG_RIGLINK=y
CONFIG_RIGLINK_BACKEND_SHELL=y
CONFIG_RIGLINK_MEM_ACCESS=n

CONFIG_JCON=y
CONFIG_JCON_ENABLE_FLOAT=y
CONFIG_SERIAL=y
CONFIG_REBOOT=y

# Shell. The machine-driven I/O setup is now applied automatically by
# CONFIG_RIGLINK_BACKEND_SHELL=y; see zephyr/Kconfig. That backend defaults
# SHELL_PROMPT_UART="", SHELL_VT100_COMMANDS=n, SHELL_ECHO_STATUS=n, the serial
# RX ring to RIGLINK_LINE_BUF_SIZE, and SHELL_STACK_SIZE up to 4096 (was 2048).
# Only the knobs that are app preference (not correctness) are kept below.
# CONFIG_SHELL / CONFIG_SHELL_BACKEND_SERIAL are force-selected by the backend
# too; kept here for clarity about what the sample drives.
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_AUTOSTART=y
CONFIG_SHELL_HELP=n
CONFIG_SHELL_HISTORY=n
CONFIG_SHELL_METAKEYS=n
CONFIG_SHELL_TAB=n
CONFIG_SHELL_STATS=n
CONFIG_SHELL_CMD_BUFF_SIZE=256
CONFIG_SHELL_ARGC_MAX=10

CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
