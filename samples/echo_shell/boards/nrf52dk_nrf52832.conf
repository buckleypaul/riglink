# On nrf52dk uart0 is the J-Link VCOM. The shell takes it over. The UART log
# backend would interleave plain-text log lines on the same wire and corrupt
# the JSON stream, so disable it; if you want logs, route them to RTT
# (CONFIG_LOG_BACKEND_RTT=y) or accept CONFIG_LOG_BACKEND_SHELL=y at the cost
# of serialising logs against responses.
CONFIG_LOG_BACKEND_UART=n
CONFIG_UART_NATIVE_PTY=n
